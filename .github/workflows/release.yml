name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify build
        run: |
          CGO_ENABLED=0 go build -o /dev/null .
          go vet ./...

      - name: Determine next version
        id: version
        run: |
          # Get the latest v1.* tag (or default to v1.0.0 for first release)
          LATEST_TAG=$(git tag --list 'v1.*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            # No v1.x tag yet — start the 1.0 series
            NEXT_TAG="v1.0.0"
          else
            echo "Latest tag: $LATEST_TAG"
            # Parse major.minor.patch
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3 | cut -d- -f1)
            # Bump patch
            PATCH=$((PATCH + 1))
            NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "Next tag: $NEXT_TAG"
          echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle binaries into skill directory
        run: |
          mkdir -p skills/msgraph/scripts/bin
          # Copy the 6 raw binaries produced by GoReleaser into the skill package.
          # GoReleaser binary archives use the template: msgraph_<os>_<arch>[.exe]
          for f in dist/msgraph_darwin_amd64 dist/msgraph_darwin_arm64 \
                   dist/msgraph_linux_amd64 dist/msgraph_linux_arm64 \
                   dist/msgraph_windows_amd64.exe dist/msgraph_windows_arm64.exe; do
            if [ -f "$f" ]; then
              cp "$f" skills/msgraph/scripts/bin/
              echo "Copied $(basename $f)"
            else
              echo "Warning: $f not found" >&2
            fi
          done
          ls -lh skills/msgraph/scripts/bin/

      - name: Stamp version in SKILL.md
        run: |
          # Strip the 'v' prefix to get the semver (e.g., v1.0.1 -> 1.0.1)
          SKILL_VERSION="${{ steps.version.outputs.tag }}"
          SKILL_VERSION="${SKILL_VERSION#v}"
          sed -i "s/^version: .*/version: \"${SKILL_VERSION}\"/" skills/msgraph/SKILL.md
          echo "SKILL.md version set to: $SKILL_VERSION"
          grep '^version:' skills/msgraph/SKILL.md

      - name: Package skill directory
        run: |
          cd skills
          zip -r ../msgraph.zip msgraph/
          cd ..
          echo "Skill zip contents:"
          unzip -l msgraph.zip

      - name: Upload skill zip to release
        run: |
          gh release upload ${{ steps.version.outputs.tag }} msgraph.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
