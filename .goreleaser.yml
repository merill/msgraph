version: 2

project_name: msgraph-skill

before:
  hooks:
    - go mod tidy

builds:
  - id: msgraph-skill
    main: .
    binary: msgraph-skill
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/merill/msgraph-skill/internal/config.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
  - id: binaries
    format: binary
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: merill
    name: msgraph-skill
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
